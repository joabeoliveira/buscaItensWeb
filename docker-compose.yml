version: '3.8'

services:
  php-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: licitador-php
    expose:
      - "80"
    environment:
      - PYTHON_API_URL=http://python-api:5000/embed
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
    depends_on:
      - python-api
      - flaresolverr
    networks:
      - licitador-network

  python-api:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: licitador-python
    expose:
      - "5000"
    networks:
      - licitador-network

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TIMEZONE=America/Sao_Paulo
    expose:
      - "8191"
    networks:
      - licitador-network
    restart: unless-stopped

networks:
  licitador-network:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 2001:db8:1::/64
          gateway: 2001:db8:1::1
